<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>⚡ 我在呢 | 游戏工坊</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', 'Poppins', 'Orbitron', system-ui, -apple-system, 'Microsoft Yahei', sans-serif;
      background: radial-gradient(ellipse at 30% 40%, #0a0a2a, #020210);
      min-height: 100vh;
      color: #eef5ff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 30px 20px;
      position: relative;
      overflow-x: hidden;
    }

    /* 动态光晕背景 */
    body::before {
      content: '';
      position: fixed;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle at center, rgba(0, 255, 255, 0.08) 0%, rgba(123, 97, 255, 0.05) 50%, transparent 70%);
      animation: rotateGlow 20s linear infinite;
      pointer-events: none;
      z-index: 0;
    }

    @keyframes rotateGlow {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .header {
      text-align: center;
      margin-bottom: clamp(30px, 8vw, 55px);
      position: relative;
      z-index: 2;
      padding: 0 10px;
    }

    .header h1 {
      font-size: clamp(1.8rem, 8vw, 4rem);
      background: linear-gradient(135deg, #00ffff, #7b61ff, #ff44cc);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      letter-spacing: 2px;
      margin-bottom: 8px;
      text-shadow: 0 0 30px rgba(0, 255, 255, 0.4);
      animation: titlePulse 3s ease-in-out infinite;
    }

    @keyframes titlePulse {
      0%, 100% { opacity: 1; text-shadow: 0 0 20px rgba(0, 255, 255, 0.3); }
      50% { opacity: 0.95; text-shadow: 0 0 40px rgba(123, 97, 255, 0.6); }
    }

    .header p {
      font-size: clamp(0.85rem, 4vw, 1.2rem);
      color: #aac8ff;
      letter-spacing: 1px;
      text-shadow: 0 0 10px rgba(0, 200, 255, 0.3);
    }

    /* 游戏网格 - 响应式核心 */
    .game-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: clamp(20px, 5vw, 32px);
      width: 100%;
      max-width: 1300px;
      margin-bottom: 50px;
      position: relative;
      z-index: 2;
      padding: 0 8px;
    }

    /* 游戏卡片 - 霓虹科技风 */
    .game-card {
      background: rgba(12, 18, 40, 0.65);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(0, 255, 255, 0.35);
      border-radius: 28px;
      padding: clamp(24px, 6vw, 40px) clamp(16px, 4vw, 24px);
      min-height: 200px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      color: #e0e6ff;
      transition: all 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1);
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3), inset 0 1px 0 rgba(255, 255, 255, 0.08);
      position: relative;
      overflow: hidden;
      cursor: pointer;
    }

    .game-card:active {
      transform: scale(0.98);
    }

    @media (hover: hover) {
      .game-card:hover {
        transform: translateY(-8px) scale(1.02);
        border-color: rgba(0, 255, 255, 0.8);
        box-shadow: 0 20px 35px rgba(0, 255, 255, 0.25), 0 0 30px rgba(123, 97, 255, 0.3);
        background: rgba(20, 28, 55, 0.8);
      }
      .game-card:hover .game-icon {
        transform: scale(1.1) rotate(5deg);
      }
    }

    .game-card::before {
      content: '';
      position: absolute;
      top: -2px;
      left: -2px;
      right: -2px;
      bottom: -2px;
      background: linear-gradient(135deg, #00ffff, #7b61ff, #ff44cc, #00ffff);
      border-radius: 30px;
      opacity: 0;
      transition: opacity 0.5s ease;
      z-index: -1;
    }

    .game-card:hover::before {
      opacity: 0.5;
    }

    .game-icon {
      font-size: clamp(2.5rem, 10vw, 3.5rem);
      margin-bottom: 12px;
      filter: drop-shadow(0 0 8px rgba(0, 255, 255, 0.6));
      transition: transform 0.3s ease;
    }

    .game-card h3 {
      font-size: clamp(1.2rem, 5vw, 1.6rem);
      margin-bottom: 8px;
      background: linear-gradient(135deg, #ffffff, #88ccff);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      font-weight: 700;
      letter-spacing: 1px;
    }

    .game-card p {
      font-size: clamp(0.75rem, 3.5vw, 0.9rem);
      color: #b8c7ff;
      text-align: center;
      letter-spacing: 0.5px;
    }

    /* 标签徽章 */
    .game-badge {
      position: absolute;
      top: 12px;
      right: 12px;
      background: linear-gradient(135deg, #ff3366, #ff6633);
      padding: 4px 12px;
      border-radius: 30px;
      font-size: 0.7rem;
      font-weight: bold;
      color: white;
      box-shadow: 0 2px 8px rgba(255, 51, 102, 0.4);
      letter-spacing: 1px;
      z-index: 3;
    }

    /* 页脚 */
    .footer {
      font-size: 0.8rem;
      color: #5a6e9e;
      text-align: center;
      position: relative;
      z-index: 2;
      padding: 20px;
      border-top: 1px solid rgba(0, 255, 255, 0.2);
      width: 100%;
      max-width: 800px;
      margin-top: 10px;
    }

    /* 浮动粒子效果 */
    .particle {
      position: fixed;
      background: rgba(0, 255, 255, 0.4);
      border-radius: 50%;
      pointer-events: none;
      z-index: 1;
      animation: floatParticle 8s infinite ease-in-out;
    }

    @keyframes floatParticle {
      0% { transform: translateY(100vh) scale(0); opacity: 0; }
      10% { opacity: 0.6; }
      90% { opacity: 0.6; }
      100% { transform: translateY(-20vh) scale(1.5); opacity: 0; }
    }

    /* 手机横屏优化 */
    @media (max-width: 768px) and (orientation: landscape) {
      body {
        padding: 15px 20px;
      }
      .game-grid {
        gap: 15px;
      }
      .game-card {
        padding: 16px 12px;
        min-height: 150px;
      }
      .game-icon {
        font-size: 2rem;
        margin-bottom: 6px;
      }
      .game-card h3 {
        font-size: 1rem;
      }
      .header {
        margin-bottom: 20px;
      }
    }

    /* 手机竖屏 */
    @media (max-width: 600px) {
      .game-grid {
        grid-template-columns: 1fr;
        gap: 18px;
        max-width: 400px;
        margin: 0 auto 40px auto;
      }
      .game-card {
        padding: 24px 20px;
        min-height: 170px;
      }
      .game-badge {
        top: 10px;
        right: 10px;
        font-size: 0.6rem;
        padding: 3px 10px;
      }
      .footer {
        font-size: 0.7rem;
      }
    }

    /* 平板 */
    @media (min-width: 601px) and (max-width: 1024px) {
      .game-grid {
        grid-template-columns: repeat(2, 1fr);
        gap: 24px;
      }
    }

    /* 大屏 */
    @media (min-width: 1400px) {
      .game-grid {
        grid-template-columns: repeat(3, 1fr);
        max-width: 1400px;
      }
    }

    /* 触摸优化 - 增大点击区域 */
    @media (max-width: 768px) {
      .game-card {
        cursor: pointer;
        -webkit-tap-highlight-color: transparent;
      }
      .game-card:active {
        transform: scale(0.97);
        background: rgba(30, 40, 70, 0.8);
      }
    }
  </style>
</head>
<body>

  <div id="particlesContainer"></div>

  <div class="header">
    <h1>✨ 我在呢 ✨</h1>
    <p>| 自制游戏一起玩 |</p>
  </div>

  <div class="game-grid">
    <a href="防空系统.html" class="game-card" id="gameCardMain">
      <div class="game-badge">🔥 热门推荐</div>
      <div class="game-icon">🚀</div>
      <h3>天穹防线</h3>
      <p>导弹发射车 · 动态空袭防御</p>
      <p style="font-size:0.7rem; margin-top:10px; color:#88aaff;">⚡ 智能拦截 | 随机波次 | 霓虹战场</p>
    </a>

    <a href="#" class="game-card" style="opacity:0.7; cursor:not-allowed;" onclick="return false;">
      <div class="game-badge">🎮 开发中</div>
      <div class="game-icon">🔮</div>
      <h3>星际巡航</h3>
      <p>即将解锁 · 敬请期待</p>
    </a>

    <a href="#" class="game-card" style="opacity:0.7; cursor:not-allowed;" onclick="return false;">
      <div class="game-badge">🎮 开发中</div>
      <div class="game-icon">⚔️</div>
      <h3>虚空入侵</h3>
      <p>即将解锁 · 敬请期待</p>
    </a>
  </div>

  <div class="footer">
    <p>© 2026 我在呢 | 全平台适配 · 极致体验</p>
  </div>

  <script>
    // 动态粒子生成 - 性能优化，减少移动端粒子数量
    (function createParticles() {
      const container = document.getElementById('particlesContainer');
      if (!container) return;
      const isMobile = window.innerWidth < 768;
      const particleCount = isMobile ? 25 : 45;
      
      for (let i = 0; i < particleCount; i++) {
        const particle = document.createElement('div');
        particle.classList.add('particle');
        const size = Math.random() * (isMobile ? 4 : 6) + 2;
        particle.style.width = size + 'px';
        particle.style.height = size + 'px';
        particle.style.left = Math.random() * 100 + '%';
        particle.style.background = `radial-gradient(circle, rgba(0, 255, 255, ${Math.random() * 0.6 + 0.2}), rgba(123, 97, 255, 0.3))`;
        particle.style.animationDelay = Math.random() * 12 + 's';
        particle.style.animationDuration = (Math.random() * 10 + 8) + 's';
        container.appendChild(particle);
      }
    })();

    // 移动端触摸反馈优化
    (function addTouchFeedback() {
      const cards = document.querySelectorAll('.game-card');
      cards.forEach(card => {
        card.addEventListener('touchstart', function(e) {
          this.style.transform = 'scale(0.97)';
        }, { passive: true });
        card.addEventListener('touchend', function(e) {
          this.style.transform = '';
        });
        card.addEventListener('touchcancel', function(e) {
          this.style.transform = '';
        });
      });
    })();

    // 鼠标光晕效果 - 仅PC端启用（避免移动端性能问题）
    if (window.matchMedia('(hover: hover)').matches) {
      const cards = document.querySelectorAll('.game-card');
      cards.forEach(card => {
        card.addEventListener('mousemove', (e) => {
          const rect = card.getBoundingClientRect();
          const x = e.clientX - rect.left;
          const y = e.clientY - rect.top;
          card.style.setProperty('--mouse-x', x + 'px');
          card.style.setProperty('--mouse-y', y + 'px');
        });
      });
    }

    // 检测是否为移动设备并优化视口
    function handleOrientationChange() {
      const vh = window.innerHeight;
      document.documentElement.style.setProperty('--vh', `${vh}px`);
    }
    window.addEventListener('resize', handleOrientationChange);
    handleOrientationChange();
  </script>
  
  <style>
    /* 鼠标跟随光晕 - 仅桌面端生效 */
    @media (hover: hover) {
      .game-card {
        position: relative;
        overflow: hidden;
      }
      .game-card::after {
        content: '';
        position: absolute;
        top: var(--mouse-y, 50%);
        left: var(--mouse-x, 50%);
        width: 120px;
        height: 120px;
        background: radial-gradient(circle, rgba(0, 255, 255, 0.25), transparent 70%);
        transform: translate(-50%, -50%);
        opacity: 0;
        transition: opacity 0.2s;
        pointer-events: none;
        border-radius: 50%;
        z-index: 1;
      }
      .game-card:hover::after {
        opacity: 1;
      }
      .game-card h3, .game-card p, .game-icon {
        position: relative;
        z-index: 2;
      }
      .game-badge {
        z-index: 3;
      }
    }
  </style>
</body>
</html>
