<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <!-- 关键：自适应手机/电脑 -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>我在呢</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Arial', sans-serif;
    }

    body {
      background: #121212;
      color: white;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
      text-align: center;
    }

    /* 标题样式 */
    .title {
      font-size: 42px;
      margin-bottom: 10px;
      color: #ffcc00;
    }

    .subtitle {
      font-size: 18px;
      color: #ccc;
      margin-bottom: 40px;
    }

    /* 游戏按钮区域（自适应布局） */
    .game-buttons {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      width: 100%;
      max-width: 900px;
    }

    /* 游戏按钮 */
    .game-btn {
      background: #222;
      border: 2px solid #ffcc00;
      color: white;
      padding: 20px;
      border-radius: 12px;
      font-size: 18px;
      text-decoration: none;
      transition: 0.3s;
    }

    .game-btn:hover {
      background: #ffcc00;
      color: #121212;
      transform: scale(1.05);
    }

    /* 手机小屏优化 */
    @media (max-width: 600px) {
      .title {
        font-size: 32px;
      }
    }
  </style>
</head>

<body>
  <!-- 标题 -->
  <h1 class="title">我的个人游戏主页</h1>
  <p class="subtitle">选择你想玩的游戏</p>

  <!-- 游戏链接按钮（可自己改名字+链接） -->
  <div class="game-buttons">
    <a href="dazhuankuai/index.html" class="game-btn">打砖块</a>
    <a href="https://你的游戏2链接" class="game-btn">游戏 2</a>
    <a href="https://你的游戏3链接" class="game-btn">游戏 3</a>
    <a href="https://你的游戏4链接" class="game-btn">游戏 4</a>
    <a href="https://你的游戏5链接" class="game-btn">游戏 5</a>
    <a href="https://你的游戏6链接" class="game-btn">游戏 6</a>
  </div>
</body>
</html>
