<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>英语单词配对</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#f1f8e9;font-family:"微软雅黑";text-align:center;padding:10px}
h1{color:#558b2f;margin:10px 0}
.game-card{background:#fff;border-radius:16px;padding:20px;max-width:400px;margin:20px auto;box-shadow:0 4px 12px #0002}
.word-img{width:120px;height:120px;object-fit:cover;border-radius:8px;margin-bottom:15px}
.options{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin:20px 0}
.option-btn{background:#8bc34a;color:#fff;border:none;border-radius:10px;padding:15px 0;font-size:18px}
.option-btn:hover{background:#689f38}
#tip{font-size:18px;margin:10px}
</style>
</head>
<body>
<h1>英语单词配对</h1>
<div class="game-card">
<img class="word-img" id="wordImg" src="https://picsum.photos/seed/cat/120/120">
<div class="options" id="options"></div>
<div id="tip"></div>
</div>

<script>
// 单词库：图片+英文+中文
const wordList=[
 {img:"https://picsum.photos/seed/cat/120/120",en:"cat",cn:"猫"},
 {img:"https://picsum.photos/seed/dog/120/120",en:"dog",cn:"狗"},
 {img:"https://picsum.photos/seed/apple/120/120",en:"apple",cn:"苹果"},
 {img:"https://picsum.photos/seed/banana/120/120",en:"banana",cn:"香蕉"},
 {img:"https://picsum.photos/seed/sun/120/120",en:"sun",cn:"太阳"},
 {img:"https://picsum.photos/seed/moon/120/120",en:"moon",cn:"月亮"}
];
let current,options;

// 随机出题
function newQuestion(){
 current=wordList[Math.floor(Math.random()*wordList.length)];
 // 生成3个干扰项+正确答案
 const distractors=wordList.filter(w=>w.en!==current.en);
 options=[current.en,...distractors.sort(()=>Math.random()).slice(0,3)].sort(()=>Math.random());
 // 更新图片和选项
 document.getElementById("wordImg").src=current.img;
 const opts=document.getElementById("options");
 opts.innerHTML="";
 options.forEach(opt=>{
 const btn=document.createElement("button");
 btn.className="option-btn";
 btn.innerText=opt;
 btn.onclick=()=>checkAnswer(opt);
 opts.appendChild(btn);
 });
 document.getElementById("tip").innerText="";
}

// 检查答案
function checkAnswer(ans){
 if(ans===current.en){
 document.getElementById("tip").innerText=`✅ 正确！${current.cn}`;
 setTimeout(newQuestion,1200);
 }else{
 document.getElementById("tip").innerText="❌ 再试试～";
 }
}

newQuestion();
</script>
</body>
</html>
