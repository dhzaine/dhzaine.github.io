<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>天穹防线 - 导弹发射车 | 动态空袭</title>
    <style>
        * {
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: radial-gradient(ellipse at 20% 30%, #0a0f2a, #030617);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Orbitron', 'Poppins', 'Courier New', monospace;
            color: #eef5ff;
            overflow: hidden;
        }

        /* 首页霓虹风格 */
        .home-page {
            text-align: center;
            padding: 40px;
            border-radius: 48px;
            background: rgba(5, 10, 30, 0.75);
            backdrop-filter: blur(12px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.6), 0 0 0 1px rgba(0, 255, 255, 0.2), 0 0 30px rgba(0, 200, 255, 0.1);
            max-width: 80%;
            margin: 0 auto;
            border: 1px solid rgba(0, 255, 255, 0.3);
        }
        .home-page h1 {
            font-size: 2.5rem;
            background: linear-gradient(135deg, #00ffff, #ff44cc);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 0 20px rgba(0, 255, 255, 0.5);
            margin-bottom: 20px;
            letter-spacing: 2px;
        }
        .home-page p {
            margin: 15px 0;
            color: #bbd4ff;
            font-size: 1.1rem;
            text-shadow: 0 0 5px rgba(0,0,0,0.5);
        }
        .home-btn {
            background: linear-gradient(135deg, #ff3366, #ff6633);
            border: none;
            font-weight: bold;
            font-size: 1.2rem;
            padding: 12px 30px;
            border-radius: 60px;
            color: white;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 8px 20px rgba(255, 51, 102, 0.4);
            margin: 10px 5px;
            letter-spacing: 1px;
        }
        .home-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 25px rgba(255, 51, 102, 0.6);
            background: linear-gradient(135deg, #ff4466, #ff7744);
        }

        .game-container {
            background: rgba(2, 8, 20, 0.7);
            backdrop-filter: blur(8px);
            border-radius: 48px;
            padding: 20px;
            box-shadow: 0 25px 45px rgba(0,0,0,0.7), inset 0 1px 1px rgba(255,255,255,0.1), 0 0 0 1px rgba(0, 255, 255, 0.2);
            max-width: 100vw;
            max-height: 95vh;
            display: none;
            position: relative;
        }

        canvas {
            display: block;
            margin: 0 auto;
            border-radius: 28px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5), 0 0 0 1px rgba(0, 255, 255, 0.3);
            cursor: none;
            background: #01040f;
            max-width: 100%;
            height: auto;
        }

        .info-panel {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 18px;
            gap: 15px;
            flex-wrap: wrap;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(8px);
            padding: 10px 20px;
            border-radius: 60px;
            border: 1px solid rgba(0, 255, 255, 0.3);
        }

        .stats {
            background: rgba(0, 20, 40, 0.8);
            backdrop-filter: blur(4px);
            padding: 8px 20px;
            border-radius: 60px;
            display: flex;
            gap: 25px;
            font-size: 1rem;
            font-weight: bold;
            font-family: 'Orbitron', monospace;
            color: #0ff;
            text-shadow: 0 0 5px #0ff;
        }
        .stats span span {
            color: #ffaa44;
            font-size: 1.2rem;
        }

        .level-box {
            background: linear-gradient(135deg, #ffaa33, #ff6633);
            color: #0a0a1a;
            padding: 6px 22px;
            border-radius: 40px;
            font-weight: bold;
            letter-spacing: 1px;
            font-family: 'Orbitron', monospace;
            box-shadow: 0 0 10px rgba(255, 102, 51, 0.5);
        }

        .game-btn {
            background: linear-gradient(135deg, #1e2a4a, #0a1a2a);
            border: 1px solid rgba(0, 255, 255, 0.4);
            font-weight: bold;
            font-size: 0.85rem;
            padding: 6px 18px;
            border-radius: 40px;
            color: #ccf;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
            font-family: 'Segoe UI', monospace;
        }
        .game-btn:hover {
            background: linear-gradient(135deg, #2a3a5a, #1a2a3a);
            border-color: #0ff;
            color: #fff;
            transform: scale(0.96);
            box-shadow: 0 0 12px rgba(0, 255, 255, 0.3);
        }
        .pause-btn-active {
            background: linear-gradient(135deg, #ffaa33, #ff6633);
            border-color: #ffcc88;
            color: #1a1a2a;
            text-shadow: none;
        }

        .instruction {
            font-size: 0.7rem;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(4px);
            padding: 6px 16px;
            border-radius: 30px;
            margin-top: 12px;
            text-align: center;
            color: #aaf;
            border: 1px solid rgba(0, 255, 255, 0.3);
        }

        /* 游戏失败弹窗 */
        .game-over-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(8px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 100;
            pointer-events: auto;
        }
        .modal-content {
            position: relative;
            background: rgba(8, 12, 28, 0.95);
            backdrop-filter: blur(20px);
            padding: 28px 38px;
            border-radius: 40px;
            text-align: center;
            box-shadow: 0 25px 50px rgba(0,0,0,0.6), 0 0 0 2px rgba(0, 255, 255, 0.5), 0 0 20px rgba(0, 255, 255, 0.3);
            cursor: grab;
            min-width: 340px;
            border: 1px solid rgba(255, 100, 100, 0.6);
        }
        .modal-content:active { cursor: grabbing; }
        .modal-content h2 {
            color: #ff5577;
            font-size: 2rem;
            margin-bottom: 18px;
            text-shadow: 0 0 10px rgba(255, 80, 80, 0.6);
        }
        .modal-content p {
            font-size: 1.1rem;
            margin: 10px 0;
            color: #ccddff;
        }
        .modal-content .home-btn {
            background: linear-gradient(135deg, #ff3366, #ff6633);
            margin: 8px 8px;
            font-size: 1rem;
            padding: 8px 24px;
        }
        .drag-handle {
            cursor: grab;
            position: absolute;
            top: 12px;
            right: 18px;
            font-size: 11px;
            color: #0ff;
            background: rgba(0,0,0,0.5);
            padding: 3px 12px;
            border-radius: 30px;
            font-family: monospace;
            letter-spacing: 1px;
        }

        /* 自定义确认弹窗 */
        .custom-confirm-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(10px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 200;
            pointer-events: auto;
        }
        .confirm-content {
            background: rgba(6, 10, 26, 0.96);
            backdrop-filter: blur(20px);
            padding: 30px 40px;
            border-radius: 40px;
            text-align: center;
            box-shadow: 0 25px 45px rgba(0,0,0,0.7), 0 0 0 2px rgba(0, 200, 255, 0.5);
            min-width: 320px;
            border: 1px solid rgba(0, 255, 200, 0.6);
        }
        .confirm-content h3 {
            color: #ffaa66;
            font-size: 1.7rem;
            margin-bottom: 20px;
            text-shadow: 0 0 8px rgba(255, 100, 0, 0.4);
        }
        .confirm-content p {
            color: #bbddff;
            font-size: 1rem;
            margin-bottom: 28px;
        }
        .confirm-buttons {
            display: flex;
            gap: 25px;
            justify-content: center;
        }
        .confirm-btn {
            background: linear-gradient(135deg, #1e2a4a, #0a1a2a);
            border: 1px solid #0ff;
            font-weight: bold;
            font-size: 1rem;
            padding: 8px 28px;
            border-radius: 40px;
            color: #ccf;
            cursor: pointer;
            transition: all 0.2s;
        }
        .confirm-btn-yes {
            background: linear-gradient(135deg, #ff3366, #ff6633);
            border-color: #ffaa88;
            color: white;
        }
        .confirm-btn-yes:hover {
            transform: scale(0.96);
            box-shadow: 0 0 15px rgba(255, 51, 102, 0.5);
        }
        .confirm-btn-no:hover {
            transform: scale(0.96);
            border-color: #0ff;
            background: #2a3a5a;
        }

        @media (max-width: 860px) {
            .stats { font-size: 0.7rem; gap: 12px; padding: 5px 12px; }
            .level-box { font-size: 0.75rem; padding: 4px 12px; }
            .game-btn { font-size: 0.7rem; padding: 4px 12px; }
            .modal-content { padding: 20px 22px; min-width: 260px; }
        }
    </style>
</head>
<body>
    <div class="home-page" id="homePage">
        <h1>⚡ 天穹防线 · 导弹发射车 ⚡</h1>
        <p>操控尖端导弹发射车，拦截随机来袭的高爆炸弹！</p>
        <p>🖱️ 鼠标移动 → 战车左右机动</p>
        <p>🚀 点击 / 空格/Enter → 发射拦截导弹 (动态弹道)</p>
        <p>⏸️ 按【P】随时暂停 | 每波炸弹数量随机</p>
        <button class="home-btn" id="startGameBtn">▶ 开始防御</button>
        <button class="home-btn" id="fullscreenBtn">⛶ 全屏作战</button>
    </div>

    <div class="game-container" id="gameContainer">
        <canvas id="gameCanvas" width="1000" height="700"></canvas>
        <div class="info-panel">
            <div class="stats">
                <span>🎯 拦截: <span id="scoreValue">0</span></span>
                <span>💣 残余: <span id="bombsLeft">0</span></span>
                <span>⭐ 警戒: <span id="levelNum">1</span></span>
            </div>
            <div class="level-box">
                ⏳ 下一波: <span id="refillTimer">--</span> s
            </div>
            <button class="game-btn" id="pauseGameBtn">⏸️ 暂停</button>
            <button class="game-btn" id="resetGameBtn">🔄 重来</button>
            <button class="game-btn" id="backHomeBtn">🏠 主页</button>
            <button class="game-btn" id="gameFullscreenBtn">⛶ 全屏</button>
        </div>
        <div class="instruction">
            🖱️ 鼠标移动 | 点击/空格发射导弹 | 战车速度影响弹道 | 💥 炸弹触碰红色禁区即失败
        </div>
    </div>

    <!-- 失败弹窗 -->
    <div class="game-over-modal" id="gameOverModal">
        <div class="modal-content" id="draggableModal">
            <div class="drag-handle" id="dragHandle">⋮⋮ 拖动</div>
            <h2>💀 防线崩溃</h2>
            <p>炸弹侵入居民区，任务失败</p>
            <p>🎯 最终拦截: <span id="finalScore">0</span></p>
            <p>⚡ 最高警戒: <span id="finalLevel">1</span></p>
            <div>
                <button class="home-btn" id="restartBtn">🔄 重新挑战</button>
                <button class="home-btn" id="backHomeFromOverBtn">🏠 返回主页</button>
            </div>
        </div>
    </div>

    <!-- 返回确认弹窗 -->
    <div class="custom-confirm-modal" id="customConfirmModal">
        <div class="confirm-content">
            <h3>⚠️ 终止任务</h3>
            <p>返回主页将丢失当前战局，确定撤离吗？</p>
            <div class="confirm-buttons">
                <button class="confirm-btn confirm-btn-yes" id="confirmYesBtn">✅ 确认撤离</button>
                <button class="confirm-btn confirm-btn-no" id="confirmNoBtn">❌ 继续战斗</button>
            </div>
        </div>
    </div>

<script>
    (function(){
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const homePage = document.getElementById('homePage');
        const gameContainer = document.getElementById('gameContainer');
        const gameOverModal = document.getElementById('gameOverModal');
        const customConfirmModal = document.getElementById('customConfirmModal');
        const pauseBtn = document.getElementById('pauseGameBtn');
        
        const BASE_WIDTH = 1000;
        const BASE_HEIGHT = 700;
        const BOMB_START_Y = 40;
        const AIR_DEFENSE_Y = 580;
        const RESIDENTIAL_LINE_Y = 620;
        const GROUND_Y = 680;
        const AIR_MIN_X = 45;
        const AIR_MAX_X = BASE_WIDTH - 45;
        
        let score = 0;
        let currentLevel = 1;
        let bombs = [];
        let interceptors = [];
        let gameActive = false;      // 初始未开始
        let gameOverFlag = false;
        let paused = false;
        let levelUpPending = false;
        
        let airDefenseX = BASE_WIDTH/2;
        let lastAirDefenseX = airDefenseX;
        let airDefenseVelocity = 0;
        let canShoot = true;
        let shootCooldownFrames = 0;
        
        let bombWidth = 0;
        let bombHeight = 32;
        const MAX_BOMBS_PER_ROW = 10;
        
        let refillTimer = 0;
        let refillInterval = 4.0;
        
        let scaleRatio = 1, offsetX = 0, offsetY = 0;
        let animationId = null;
        let wasPausedBeforeConfirm = false;
        let isGameInitialized = false;  // 防止重复初始化
        
        function updateUI() {
            document.getElementById('scoreValue').innerText = score;
            document.getElementById('levelNum').innerText = currentLevel;
            const activeCount = bombs.filter(b => b.active).length;
            document.getElementById('bombsLeft').innerText = activeCount;
        }
        
        function resetRefillTimerDynamic() {
            let base = Math.max(2.2, 5.0 - (currentLevel-1) * 0.55);
            base = Math.min(base, 5.0);
            refillInterval = base;
            refillTimer = refillInterval;
        }
        
        function generateRandomBombRow(yPos) {
            const bombCount = Math.floor(Math.random() * (MAX_BOMBS_PER_ROW - 2)) + 3;
            const startX = 40;
            const totalWidth = BASE_WIDTH - 80;
            bombWidth = totalWidth / MAX_BOMBS_PER_ROW;
            let fallSpeed = 0.85 + (currentLevel - 1) * 0.18;
            fallSpeed = Math.min(fallSpeed, 3.3);
            const columns = new Array(MAX_BOMBS_PER_ROW).fill(false);
            let placed = 0;
            while(placed < bombCount) {
                const col = Math.floor(Math.random() * MAX_BOMBS_PER_ROW);
                if(!columns[col]) { columns[col] = true; placed++; }
            }
            const bombsRow = [];
            for(let col = 0; col < MAX_BOMBS_PER_ROW; col++) {
                if(columns[col]) {
                    let x = startX + col * bombWidth;
                    bombsRow.push({
                        x, y: yPos, w: bombWidth - 3, h: bombHeight - 2,
                        active: true, speedY: fallSpeed, falling: true,
                        glowPhase: Math.random() * Math.PI * 2
                    });
                }
            }
            return bombsRow;
        }
        
        function initBombsWave() {
            bombs = [];
            const rowGap = bombHeight + 8;
            for(let row = 0; row < 3; row++) {
                bombs.push(...generateRandomBombRow(BOMB_START_Y + row * rowGap));
            }
            updateUI();
        }
        
        function addRandomTopRow() {
            if(gameOverFlag || !gameActive) return;
            const shiftY = bombHeight + 8;
            for(let bomb of bombs) bomb.y += shiftY;
            bombs = bombs.filter(b => b.y + b.h < BASE_HEIGHT + 120);
            bombs.push(...generateRandomBombRow(BOMB_START_Y));
            updateUI();
        }
        
        function performRefill() {
            if(gameOverFlag || !gameActive || paused) return;
            addRandomTopRow();
            resetRefillTimerDynamic();
        }
        
        function ensureAllFalling() { for(let b of bombs) if(b.active) b.falling = true; }
        
        function advanceToNextLevel() {
            if(gameOverFlag) return;
            currentLevel++;
            updateUI();
            interceptors = [];
            airDefenseX = Math.min(AIR_MAX_X, Math.max(AIR_MIN_X, BASE_WIDTH/2));
            lastAirDefenseX = airDefenseX;
            airDefenseVelocity = 0;
            bombs = [];
            initBombsWave();
            ensureAllFalling();
            resetRefillTimerDynamic();
            canShoot = true;
            shootCooldownFrames = 0;
            levelUpPending = false;
            updateUI();
        }
        
        function checkClearAndLevelUp() {
            if(levelUpPending || gameOverFlag) return;
            if(!bombs.some(b => b.active) && bombs.length > 0) {
                levelUpPending = true;
                advanceToNextLevel();
            }
        }
        
        function handleInterceptorHit(inter, idx) {
            const bomb = bombs[idx];
            if(!bomb.active) return false;
            bomb.active = false;
            score += 10;
            updateUI();
            inter.active = false;
            checkClearAndLevelUp();
            return true;
        }
        
        function updateInterceptors() {
            for(let i=0; i<interceptors.length; i++) {
                const inter = interceptors[i];
                if(!inter.active) { interceptors.splice(i,1); i--; continue; }
                inter.x += inter.vx;
                inter.y += inter.vy;
                if(inter.y + 10 < -80 || inter.y - 10 > BASE_HEIGHT+150 || inter.x < -100 || inter.x > BASE_WIDTH+100) {
                    inter.active = false;
                    interceptors.splice(i,1); i--;
                    continue;
                }
                let hit = false;
                for(let idx=0; idx<bombs.length; idx++) {
                    const b = bombs[idx];
                    if(!b.active) continue;
                    if(inter.x + 8 > b.x && inter.x - 8 < b.x + b.w && inter.y + 8 > b.y && inter.y - 8 < b.y + b.h) {
                        handleInterceptorHit(inter, idx);
                        hit = true;
                        break;
                    }
                }
                if(hit) { interceptors.splice(i,1); i--; }
            }
        }
        
        function updateBombsMovement(deltaSec) {
            if(gameOverFlag) return;
            for(let bomb of bombs) {
                if(!bomb.active || !bomb.falling) continue;
                bomb.y += bomb.speedY * deltaSec * 60;
                if(bomb.y > BASE_HEIGHT + 200) bomb.active = false;
            }
            for(let bomb of bombs) {
                if(bomb.active && bomb.falling && (bomb.y + bomb.h) >= RESIDENTIAL_LINE_Y) {
                    gameOverFlag = true; gameActive = false;
                    document.getElementById('finalScore').innerText = score;
                    document.getElementById('finalLevel').innerText = currentLevel;
                    gameOverModal.style.display = 'flex';
                    return;
                }
            }
            updateUI();
        }
        
        function shootProjectile() {
            if(!gameActive || gameOverFlag || paused || !canShoot) return;
            let speedX = Math.min(14, Math.max(-14, airDefenseVelocity));
            const startX = airDefenseX, startY = AIR_DEFENSE_Y - 18;
            let vx = speedX * 1.02 + (Math.random() - 0.5) * 0.9;
            let vy = -12.5 + (Math.random() - 0.5) * 0.7;
            interceptors.push({ x: startX, y: startY, vx, vy, active: true });
            canShoot = false;
            shootCooldownFrames = 8;
        }
        
        function updateLogic(deltaSec) {
            if(!gameActive || gameOverFlag || paused) return;
            airDefenseVelocity = airDefenseX - lastAirDefenseX;
            lastAirDefenseX = airDefenseX;
            if(Math.abs(airDefenseVelocity) > 20) airDefenseVelocity *= 0.9;
            if(shootCooldownFrames > 0 && --shootCooldownFrames === 0) canShoot = true;
            if(refillTimer > 0) {
                refillTimer -= deltaSec;
                if(refillTimer <= 0) { refillTimer = 0; performRefill(); }
            }
            document.getElementById('refillTimer').innerText = refillTimer > 0 ? refillTimer.toFixed(1) : "0.0";
            updateBombsMovement(deltaSec);
            updateInterceptors();
            airDefenseX = Math.min(AIR_MAX_X, Math.max(AIR_MIN_X, airDefenseX));
        }
        
        // 华丽渲染
        function drawBombShape(bomb) {
            const cx = bomb.x + bomb.w/2, cy = bomb.y + bomb.h/2, rx = bomb.w/2, ry = bomb.h/2;
            ctx.save();
            ctx.shadowBlur = 8;
            ctx.shadowColor = "#ff5500";
            const grad = ctx.createLinearGradient(bomb.x, bomb.y, bomb.x+bomb.w, bomb.y+bomb.h);
            grad.addColorStop(0, "#4a2a1a");
            grad.addColorStop(1, "#8a3a1a");
            ctx.fillStyle = grad;
            ctx.beginPath();
            ctx.ellipse(cx, cy, rx, ry, 0, 0, Math.PI*2);
            ctx.fill();
            ctx.fillStyle = "#dd8844";
            ctx.beginPath();
            ctx.rect(cx-4, cy-ry-4, 8, 8);
            ctx.fill();
            const flicker = (Date.now() * 0.012 + bomb.glowPhase) % (Math.PI*2);
            ctx.fillStyle = `rgba(255, 80, 30, ${0.8 + Math.sin(flicker)*0.2})`;
            ctx.beginPath();
            ctx.ellipse(cx, cy-ry-6, 4, 6, 0, 0, Math.PI*2);
            ctx.fill();
            ctx.fillStyle = "#ffcc88";
            ctx.font = `${Math.floor(bomb.h*0.5)}px "Segoe UI"`;
            ctx.fillText("💣", cx-10, cy+6);
            ctx.restore();
        }
        
        function drawMissileLauncher() {
            const x = airDefenseX, y = AIR_DEFENSE_Y;
            ctx.save();
            ctx.shadowBlur = 0;
            ctx.fillStyle = "#2a6a4a";
            ctx.beginPath();
            ctx.ellipse(x, y+6, 22, 12, 0, 0, Math.PI*2);
            ctx.fill();
            ctx.fillStyle = "#1e4a2e";
            ctx.beginPath();
            ctx.ellipse(x, y+4, 20, 10, 0, 0, Math.PI*2);
            ctx.fill();
            ctx.fillStyle = "#3a8a5a";
            ctx.fillRect(x-18, y-8, 36, 14);
            ctx.fillStyle = "#5aaa7a";
            ctx.fillRect(x-10, y-14, 20, 10);
            ctx.fillStyle = "#88cc88";
            ctx.fillRect(x-7, y-12, 14, 6);
            ctx.fillStyle = "#4a6e3a";
            ctx.beginPath();
            ctx.moveTo(x-8, y-18); ctx.lineTo(x, y-32); ctx.lineTo(x+8, y-18);
            ctx.fill();
            ctx.fillStyle = "#d0d0e0";
            ctx.beginPath();
            ctx.moveTo(x-4, y-32); ctx.quadraticCurveTo(x, y-52, x+4, y-32); ctx.fill();
            ctx.fillStyle = "#ff5555";
            ctx.beginPath();
            ctx.moveTo(x-3, y-48); ctx.lineTo(x, y-58); ctx.lineTo(x+3, y-48); ctx.fill();
            ctx.fillStyle = "#b0b0c0";
            ctx.beginPath();
            ctx.moveTo(x-8, y-36); ctx.lineTo(x-12, y-32); ctx.lineTo(x-6, y-34); ctx.fill();
            ctx.beginPath();
            ctx.moveTo(x+8, y-36); ctx.lineTo(x+12, y-32); ctx.lineTo(x+6, y-34); ctx.fill();
            const flame = Date.now() * 0.02;
            ctx.fillStyle = `rgba(255, 100, 30, ${0.7 + Math.sin(flame)*0.3})`;
            ctx.beginPath();
            ctx.moveTo(x-3, y-30); ctx.lineTo(x, y-22); ctx.lineTo(x+3, y-30); ctx.fill();
            for(let i=-2;i<=2;i++) {
                ctx.fillStyle = "#2a2a2a";
                ctx.beginPath(); ctx.arc(x+i*8, y+10, 4, 0, Math.PI*2); ctx.fill();
                ctx.fillStyle = "#5a5a5a";
                ctx.beginPath(); ctx.arc(x+i*8, y+10, 2, 0, Math.PI*2); ctx.fill();
            }
            ctx.fillStyle = "#88aaff";
            ctx.beginPath(); ctx.arc(x+14, y-10, 4, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = "#aaccff";
            ctx.beginPath(); ctx.arc(x+14, y-10, 2, 0, Math.PI*2); ctx.fill();
            if(Math.abs(airDefenseVelocity) > 0.5) {
                ctx.beginPath();
                let arrowX = x + (airDefenseVelocity > 0 ? 32 : -32);
                ctx.moveTo(x, y-20); ctx.lineTo(arrowX, y-12);
                ctx.lineWidth = 2.5; ctx.strokeStyle = "#ffaa55"; ctx.stroke();
            }
            ctx.font = "bold 10px 'Orbitron'";
            ctx.fillStyle = "#0ff";
            ctx.fillText(`⚡ ${Math.abs(airDefenseVelocity).toFixed(1)}`, x-45, y-22);
            ctx.fillStyle = "#aaffaa";
            ctx.font = "bold 9px monospace";
            ctx.fillText("MIM-104", x-15, y-6);
            ctx.restore();
        }
        
        function drawInterceptorMissile(inter) {
            ctx.save();
            ctx.shadowBlur = 8; ctx.shadowColor = "#0ff";
            ctx.beginPath();
            ctx.moveTo(inter.x, inter.y-6);
            ctx.lineTo(inter.x+3, inter.y);
            ctx.lineTo(inter.x+2, inter.y+4);
            ctx.lineTo(inter.x, inter.y+5);
            ctx.lineTo(inter.x-2, inter.y+4);
            ctx.lineTo(inter.x-3, inter.y);
            ctx.closePath();
            ctx.fillStyle = "#4fc3f7"; ctx.fill();
            ctx.fillStyle = "#ffaa44";
            ctx.beginPath();
            ctx.moveTo(inter.x, inter.y-8); ctx.lineTo(inter.x+2, inter.y-4); ctx.lineTo(inter.x-2, inter.y-4); ctx.fill();
            ctx.beginPath();
            ctx.moveTo(inter.x, inter.y+5); ctx.lineTo(inter.x-2, inter.y+10); ctx.lineTo(inter.x+2, inter.y+10);
            ctx.fillStyle = `rgba(255, 160, 50, 0.9)`; ctx.fill();
            ctx.restore();
        }
        
        function drawResidential() {
            ctx.fillStyle = "rgba(220, 60, 50, 0.5)";
            ctx.fillRect(0, RESIDENTIAL_LINE_Y, BASE_WIDTH, GROUND_Y - RESIDENTIAL_LINE_Y + 12);
            ctx.fillStyle = "#ff8877";
            ctx.font = "bold 18px 'Orbitron'";
            ctx.textAlign = "center";
            ctx.fillText("⚠️ 绝对禁区 — 炸弹触碰即任务失败 ⚠️", BASE_WIDTH/2, RESIDENTIAL_LINE_Y + 24);
            ctx.textAlign = "left";
            ctx.font = "italic 11px monospace";
            ctx.fillStyle = "#ffaa99";
            ctx.fillText("任何飞行物越过红线 → 防线崩溃", 35, RESIDENTIAL_LINE_Y + 52);
        }
        
        function drawStars() {
            for(let i=0;i<180;i++) {
                const starX = (i*131)%BASE_WIDTH;
                const starY = (i*253)%(RESIDENTIAL_LINE_Y-50);
                ctx.fillStyle = `rgba(255, 255, 200, ${0.2 + Math.sin(Date.now()*0.0008 + i)*0.1})`;
                ctx.beginPath(); ctx.arc(starX, starY, 1.2, 0, Math.PI*2); ctx.fill();
            }
        }
        
        function draw() {
            ctx.clearRect(0,0,BASE_WIDTH,BASE_HEIGHT);
            const grad = ctx.createLinearGradient(0,0,0,BASE_HEIGHT);
            grad.addColorStop(0,"#02061a"); grad.addColorStop(1,"#0c1535");
            ctx.fillStyle=grad; ctx.fillRect(0,0,BASE_WIDTH,BASE_HEIGHT);
            drawStars();
            for(let b of bombs) if(b.active) drawBombShape(b);
            for(let i of interceptors) drawInterceptorMissile(i);
            drawMissileLauncher();
            drawResidential();
            if(levelUpPending && !gameOverFlag){
                ctx.font="bold 36px 'Orbitron'"; ctx.fillStyle="#0ff"; ctx.shadowBlur=12;
                ctx.textAlign="center"; ctx.fillText("⚡ 等级提升 ⚡", BASE_WIDTH/2, 130);
                ctx.textAlign="left"; ctx.shadowBlur=0;
            }
            if(paused && gameActive && !gameOverFlag){
                ctx.font="bold 48px 'Orbitron'"; ctx.fillStyle="#ffe5aa"; ctx.shadowBlur=12;
                ctx.textAlign="center"; ctx.fillText("⏸ 战术暂停", BASE_WIDTH/2, BASE_HEIGHT/2-30);
                ctx.font="18px monospace"; ctx.fillStyle="#c5e0ff";
                ctx.fillText("按 P 键或点击「继续」恢复作战", BASE_WIDTH/2, BASE_HEIGHT/2+40);
                ctx.textAlign="left";
            }
            // 游戏未开始时显示等待提示
            if(!gameActive && !gameOverFlag && gameContainer.style.display === 'block') {
                ctx.font="bold 32px 'Orbitron'"; ctx.fillStyle="#0ff"; ctx.shadowBlur=12;
                ctx.textAlign="center"; ctx.fillText("⚡ 点击「开始防御」⚡", BASE_WIDTH/2, BASE_HEIGHT/2);
                ctx.font="18px monospace"; ctx.fillStyle="#aaf";
                ctx.fillText("按 P 键暂停 | 鼠标移动控制战车", BASE_WIDTH/2, BASE_HEIGHT/2+60);
                ctx.textAlign="left";
            }
        }
        
        function calculateScale() {
            if(!gameContainer) return;
            const cw=gameContainer.clientWidth-40, ch=window.innerHeight*0.85;
            scaleRatio=Math.min(cw/BASE_WIDTH, ch/BASE_HEIGHT,1);
            canvas.style.width=`${BASE_WIDTH*scaleRatio}px`;
            canvas.style.height=`${BASE_HEIGHT*scaleRatio}px`;
            offsetX=(canvas.clientWidth-BASE_WIDTH*scaleRatio)/2;
            offsetY=(canvas.clientHeight-BASE_HEIGHT*scaleRatio)/2;
        }
        
        function convertMousePos(cx,cy){
            const rect=canvas.getBoundingClientRect();
            return {x:(cx-rect.left-offsetX)/scaleRatio, y:(cy-rect.top-offsetY)/scaleRatio};
        }
        function handleMouseMove(e){
            if(!gameActive || gameOverFlag || paused) return;
            const pos=convertMousePos(e.clientX,e.clientY);
            airDefenseX=Math.min(AIR_MAX_X,Math.max(AIR_MIN_X,pos.x));
        }
        
        function initDragModal(){
            const modal=document.getElementById('draggableModal');
            const handle=document.getElementById('dragHandle');
            let drag=false,sX,sY,iL,iT;
            handle.addEventListener('mousedown',(e)=>{
                e.preventDefault(); drag=true; sX=e.clientX; sY=e.clientY;
                const rect=modal.getBoundingClientRect(),pr=modal.parentElement.getBoundingClientRect();
                iL=rect.left-pr.left; iT=rect.top-pr.top;
                modal.style.position='absolute'; modal.style.left=iL+'px'; modal.style.top=iT+'px'; modal.style.margin='0';
                document.body.style.userSelect='none';
            });
            window.addEventListener('mousemove',(e)=>{
                if(!drag) return;
                let nl=iL+(e.clientX-sX), nt=iT+(e.clientY-sY);
                const pr=modal.parentElement.getBoundingClientRect(), mr=modal.getBoundingClientRect();
                nl=Math.min(Math.max(nl,8),pr.width-mr.width-8);
                nt=Math.min(Math.max(nt,8),pr.height-mr.height-8);
                modal.style.left=nl+'px'; modal.style.top=nt+'px';
            });
            window.addEventListener('mouseup',()=>{ drag=false; document.body.style.userSelect=''; });
        }
        
        function togglePause(){
            if(!gameActive || gameOverFlag) return;
            paused=!paused;
            pauseBtn.innerHTML=paused?"▶️ 继续":"⏸️ 暂停";
            if(paused) pauseBtn.classList.add("pause-btn-active");
            else pauseBtn.classList.remove("pause-btn-active");
            if(!paused) lastTimestamp=0;
        }
        
        function resetGame(){
            gameActive = true;
            gameOverFlag = false;
            paused = false;
            levelUpPending = false;
            score = 0;
            currentLevel = 1;
            interceptors = [];
            bombs = [];
            canShoot = true;
            shootCooldownFrames = 0;
            airDefenseX = BASE_WIDTH/2;
            lastAirDefenseX = airDefenseX;
            airDefenseVelocity = 0;
            initBombsWave();
            ensureAllFalling();
            resetRefillTimerDynamic();
            updateUI();
            gameOverModal.style.display = 'none';
            pauseBtn.innerHTML = "⏸️ 暂停";
            pauseBtn.classList.remove("pause-btn-active");
            lastTimestamp = 0;
        }
        
        function showGame(){
            homePage.style.display = 'none';
            gameContainer.style.display = 'block';
            calculateScale();
            resetGame();  // 重置并激活游戏
            draw();
        }
        
        function showConfirmDialog(onConfirm){
            customConfirmModal.style.display='flex';
            const yesBtn=document.getElementById('confirmYesBtn'), noBtn=document.getElementById('confirmNoBtn');
            const handleYes=()=>{ customConfirmModal.style.display='none'; yesBtn.removeEventListener('click',handleYes); noBtn.removeEventListener('click',handleNo); onConfirm(true); };
            const handleNo=()=>{ customConfirmModal.style.display='none'; yesBtn.removeEventListener('click',handleYes); noBtn.removeEventListener('click',handleNo); onConfirm(false); };
            yesBtn.addEventListener('click',handleYes); noBtn.addEventListener('click',handleNo);
        }
        
        function backHomeWithConfirm(){
            if(gameOverFlag){
                if(animationId) cancelAnimationFrame(animationId);
                gameActive=false; gameContainer.style.display='none'; gameOverModal.style.display='none';
                window.location.href='index.html'; return;
            }
            wasPausedBeforeConfirm=paused;
            if(!paused && gameActive) togglePause();
            showConfirmDialog((confirmed)=>{
                if(confirmed){
                    if(animationId) cancelAnimationFrame(animationId);
                    gameActive=false; gameContainer.style.display='none'; gameOverModal.style.display='none';
                    window.location.href='index.html';
                } else {
                    if(!wasPausedBeforeConfirm && paused && gameActive) togglePause();
                    lastTimestamp=0;
                }
            });
        }
        
        function toggleFullscreen(){
            if(!document.fullscreenElement) document.documentElement.requestFullscreen();
            else document.exitFullscreen();
        }
        
        function bindEvents(){
            document.getElementById('startGameBtn')?.addEventListener('click', showGame);
            document.getElementById('fullscreenBtn')?.addEventListener('click', toggleFullscreen);
            document.getElementById('resetGameBtn')?.addEventListener('click', () => { if(gameContainer.style.display === 'block') resetGame(); });
            document.getElementById('backHomeBtn')?.addEventListener('click', backHomeWithConfirm);
            document.getElementById('gameFullscreenBtn')?.addEventListener('click', toggleFullscreen);
            document.getElementById('restartBtn')?.addEventListener('click', () => { resetGame(); gameOverModal.style.display = 'none'; });
            document.getElementById('backHomeFromOverBtn')?.addEventListener('click', backHomeWithConfirm);
            pauseBtn?.addEventListener('click', togglePause);
            canvas.addEventListener('mousemove', handleMouseMove);
            canvas.addEventListener('click',(e)=>{ e.preventDefault(); shootProjectile(); });
            window.addEventListener('keydown',(e)=>{
                if((e.code==='Space'||e.code==='Enter'||e.code==='ArrowUp') && gameContainer.style.display === 'block'){ 
                    e.preventDefault(); shootProjectile(); 
                }
                if(e.code==='KeyP' && gameContainer.style.display === 'block'){ e.preventDefault(); togglePause(); }
            });
            window.addEventListener('resize',()=>{ if(gameContainer.style.display==='block'){ calculateScale(); draw(); } });
            document.addEventListener('fullscreenchange',()=>{ if(gameContainer.style.display==='block'){ calculateScale(); draw(); } });
            initDragModal();
        }
        
        let lastTimestamp=0;
        function gameLoop(now){
            if(!lastTimestamp) lastTimestamp=now;
            let delta=Math.min(0.033,(now-lastTimestamp)/1000);
            if(delta<=0.001) delta=0.016;
            lastTimestamp=now;
            updateLogic(delta);
            draw();
            animationId=requestAnimationFrame(gameLoop);
        }
        
        function init(){
            bindEvents();
            calculateScale();
            animationId=requestAnimationFrame(gameLoop);
        }
        init();
    })();
</script>
</body>
</html>
