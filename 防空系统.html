<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>天穹防线 · 纵深弹道 | 紧凑操控 辽阔空域</title>
  <style>
    * {
      user-select: none;
      -webkit-tap-highlight-color: transparent;
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --safe-area-inset-bottom: env(safe-area-inset-bottom, 0px);
      --vh: 1vh;
    }

    body {
      background: radial-gradient(ellipse at 20% 30%, #0a0f2a, #030617);
      min-height: 100vh;
      min-height: calc(var(--vh, 1vh) * 100);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', 'Orbitron', 'Poppins', system-ui, -apple-system, monospace;
      color: #eef5ff;
      padding: 10px 12px;
      overflow-x: hidden;
      position: relative;
    }

    /* 首页面板 (不变，精致) */
    .home-page {
      text-align: center;
      padding: clamp(18px, 5vw, 36px);
      border-radius: clamp(24px, 6vw, 48px);
      background: rgba(5, 10, 30, 0.85);
      backdrop-filter: blur(12px);
      box-shadow: 0 20px 40px rgba(0,0,0,0.6), 0 0 0 1px rgba(0, 255, 255, 0.2);
      max-width: 95%;
      width: 100%;
      margin: 0 auto;
      border: 1px solid rgba(0, 255, 255, 0.3);
    }

    .home-page h1 {
      font-size: clamp(1.3rem, 5vw, 2.3rem);
      background: linear-gradient(135deg, #00ffff, #ff44cc);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      margin-bottom: 8px;
    }

    .home-page p {
      margin: 8px 0;
      color: #bbd4ff;
      font-size: clamp(0.75rem, 3.2vw, 0.95rem);
    }

    .home-btn {
      background: linear-gradient(135deg, #ff3366, #ff6633);
      border: none;
      font-weight: bold;
      font-size: clamp(0.85rem, 3.5vw, 1rem);
      padding: clamp(8px, 2.5vw, 10px) clamp(18px, 4vw, 28px);
      border-radius: 60px;
      color: white;
      cursor: pointer;
      transition: all 0.2s ease;
      box-shadow: 0 6px 16px rgba(255, 51, 102, 0.4);
      margin: 6px 4px;
    }

    .home-btn:active { transform: scale(0.96); }
    @media (hover: hover) { .home-btn:hover { transform: translateY(-2px); box-shadow: 0 10px 22px rgba(255, 51, 102, 0.6); } }

    /* 游戏主容器 — 弹道区占比更大 */
    .game-container {
      background: rgba(2, 8, 20, 0.7);
      backdrop-filter: blur(8px);
      border-radius: clamp(20px, 4vw, 48px);
      padding: 10px 10px 14px 10px;
      box-shadow: 0 25px 45px rgba(0,0,0,0.7), 0 0 0 1px rgba(0, 255, 255, 0.2);
      display: none;
      width: 100%;
      max-width: 1400px;
      position: relative;
      margin: 0 auto;
      flex-direction: column;
    }

    canvas {
      display: block;
      margin: 0 auto;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
      background: #01040f;
      width: 100% !important;
      height: auto !important;
      cursor: crosshair;
    }

    /* 信息面板 — 手机端紧凑缩小，释放垂直空间给弹道 */
    .info-panel {
      display: flex;
      justify-content: center;
      align-items: center;
      margin-top: 14px;
      margin-bottom: 6px;
      gap: 10px;
      flex-wrap: wrap;
      background: rgba(0, 0, 0, 0.55);
      backdrop-filter: blur(10px);
      padding: 6px 12px;
      border-radius: 50px;
      border: 1px solid rgba(0, 255, 255, 0.4);
    }

    .stats {
      background: rgba(0, 20, 40, 0.85);
      padding: 4px 12px;
      border-radius: 32px;
      display: flex;
      gap: 16px;
      font-size: 0.8rem;
      font-weight: bold;
      font-family: 'Orbitron', monospace;
      color: #0ff;
      flex-wrap: wrap;
      justify-content: center;
    }

    .stats span span { color: #ffaa44; }

    .level-box {
      background: linear-gradient(135deg, #ffaa33, #ff6633);
      color: #0a0a1a;
      padding: 4px 14px;
      border-radius: 32px;
      font-weight: bold;
      font-size: 0.75rem;
      white-space: nowrap;
    }

    .game-btn {
      background: linear-gradient(135deg, #1e2a4a, #0a1a2a);
      border: 1px solid rgba(0, 255, 255, 0.5);
      font-weight: bold;
      font-size: 0.7rem;
      padding: 5px 12px;
      border-radius: 32px;
      color: #ccf;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
    }

    .game-btn:active { transform: scale(0.96); }
    @media (hover: hover) { .game-btn:hover { background: linear-gradient(135deg, #2a3a5a, #1a2a3a); border-color: #0ff; color: #fff; } }

    .pause-btn-active {
      background: linear-gradient(135deg, #ffaa33, #ff6633);
      border-color: #ffcc88;
      color: #1a1a2a;
    }

    /* 手机专用底部控制区域 — 按钮缩小，更紧凑，不占用弹道区 */
    .mobile-controls {
      display: none;
      position: fixed;
      bottom: calc(14px + var(--safe-area-inset-bottom));
      left: 0;
      right: 0;
      z-index: 60;
      pointer-events: none;
    }

    .ctrl-left-group {
      position: absolute;
      left: 16px;
      bottom: 0;
      display: flex;
      gap: 18px;
      pointer-events: auto;
    }

    .ctrl-right-group {
      position: absolute;
      right: 16px;
      bottom: 0;
      pointer-events: auto;
    }

    .ctrl-btn {
      width: 58px;
      height: 58px;
      border-radius: 50%;
      background: linear-gradient(145deg, #1f2c4a, #0c142c);
      border: 2px solid rgba(0, 255, 255, 0.85);
      box-shadow: 0 6px 14px rgba(0, 0, 0, 0.5), 0 0 12px rgba(0, 255, 255, 0.4);
      color: white;
      font-size: 28px;
      font-weight: bold;
      text-align: center;
      line-height: 54px;
      cursor: pointer;
      transition: all 0.05s linear;
      touch-action: manipulation;
      backdrop-filter: blur(4px);
    }

    .ctrl-btn:active {
      transform: scale(0.92);
      background: linear-gradient(135deg, #2e4070, #182040);
      border-color: #0ff;
    }

    .ctrl-shoot {
      background: linear-gradient(135deg, #ff3366, #ff6633);
      border-color: rgba(255, 255, 255, 0.8);
      box-shadow: 0 0 20px rgba(255, 51, 102, 0.7);
      font-size: 30px;
    }

    .instruction {
      font-size: 0.62rem;
      background: rgba(0, 0, 0, 0.55);
      padding: 5px 10px;
      border-radius: 28px;
      margin-top: 8px;
      text-align: center;
      color: #cceeff;
      border: 1px solid rgba(0, 255, 255, 0.35);
    }

    /* 弹窗 (保留基础样式) */
    .game-over-modal, .custom-confirm-modal {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.85);
      backdrop-filter: blur(12px);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 100;
    }

    .modal-content, .confirm-content {
      background: rgba(8, 12, 28, 0.96);
      backdrop-filter: blur(20px);
      padding: 20px 28px;
      border-radius: 32px;
      text-align: center;
      box-shadow: 0 25px 50px rgba(0,0,0,0.6), 0 0 0 2px rgba(0, 255, 255, 0.5);
      min-width: 260px;
      max-width: 85vw;
      border: 1px solid rgba(255, 100, 100, 0.6);
    }
    .drag-handle {
      position: absolute;
      top: 10px;
      right: 14px;
      font-size: 11px;
      color: #0ff;
      background: rgba(0,0,0,0.5);
      padding: 3px 10px;
      border-radius: 30px;
      cursor: grab;
    }

    /* ========= 手机竖屏核心：极简信息栏+缩小控制钮，最大化弹道区域 ========= */
    @media (max-width: 768px) and (orientation: portrait) {
      body {
        padding: 6px 6px 0 6px;
        justify-content: flex-start;
      }
      .game-container {
        padding: 8px 6px 16px 6px;
      }
      .mobile-controls {
        display: block;
      }
      /* 控制按钮比例缩小，更精致不占屏 */
      .ctrl-btn {
        width: 52px;
        height: 52px;
        line-height: 48px;
        font-size: 26px;
      }
      .ctrl-shoot {
        font-size: 28px;
      }
      .ctrl-left-group {
        gap: 16px;
        left: 10px;
      }
      .ctrl-right-group {
        right: 10px;
      }
      /* 信息区域紧凑减小内边距，释放更多天空区域 */
      .info-panel {
        margin-top: 12px;
        margin-bottom: 4px;
        padding: 5px 10px;
        gap: 8px;
      }
      .stats {
        font-size: 0.7rem;
        gap: 12px;
        padding: 3px 10px;
      }
      .level-box {
        font-size: 0.65rem;
        padding: 3px 12px;
      }
      .game-btn {
        font-size: 0.6rem;
        padding: 4px 10px;
      }
      .instruction {
        font-size: 0.55rem;
        margin-top: 6px;
        padding: 4px 8px;
      }
      canvas {
        border-radius: 18px;
        width: 100% !important;
        height: auto !important;
      }
    }

    /* 手机横屏优化 — 按钮更紧凑，弹道水平视野开阔 */
    @media (max-width: 900px) and (orientation: landscape) {
      body {
        padding: 6px 10px;
        justify-content: center;
      }
      .mobile-controls {
        display: block;
      }
      .ctrl-btn {
        width: 48px;
        height: 48px;
        line-height: 44px;
        font-size: 24px;
      }
      .ctrl-shoot {
        font-size: 26px;
      }
      .ctrl-left-group {
        gap: 14px;
        left: 8px;
        bottom: 4px;
      }
      .ctrl-right-group {
        right: 8px;
        bottom: 4px;
      }
      .info-panel {
        margin-top: 8px;
        padding: 4px 10px;
        gap: 6px;
      }
      .stats {
        font-size: 0.62rem;
        gap: 10px;
        padding: 2px 8px;
      }
      .level-box {
        font-size: 0.6rem;
        padding: 2px 10px;
      }
      .game-btn {
        font-size: 0.55rem;
        padding: 3px 8px;
      }
      .instruction {
        font-size: 0.52rem;
        margin-top: 5px;
      }
    }

    /* 平板竖屏适当保持紧凑，但仍给弹道更多空间 */
    @media (min-width: 769px) and (max-width: 1024px) and (orientation: portrait) {
      .mobile-controls {
        display: block;
      }
      .ctrl-btn {
        width: 70px;
        height: 70px;
        line-height: 66px;
        font-size: 32px;
      }
      .info-panel {
        margin-top: 16px;
        padding: 8px 16px;
      }
      .stats {
        font-size: 0.85rem;
      }
    }

    /* 电脑端完全隐藏手机触控栏 */
    @media (min-width: 901px) {
      .mobile-controls {
        display: none !important;
      }
      .info-panel {
        margin-top: 18px;
      }
    }

    body {
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }
  </style>
</head>
<body>
<div class="home-page" id="homePage">
  <h1>⚡ 天穹防线 · 纵深弹道 ⚡</h1>
  <p>操控导弹发射车，拦截高空来袭的集群炸弹！</p>
  <p>🖱️ 鼠标/手指滑动 → 战车机动 | 🚀 点击/空格/发射按钮 → 拦截导弹</p>
  <p>⏸️ 按【P】暂停 | 每波炸弹动态密度 | 全平台纵横畅玩</p>
  <button class="home-btn" id="startGameBtn">▶ 进入战位</button>
  <button class="home-btn" id="fullscreenBtn">⛶ 全屏作战</button>
</div>

<div class="game-container" id="gameContainer">
  <canvas id="gameCanvas" width="1000" height="700"></canvas>
  <div class="info-panel">
    <div class="stats">
      <span>🎯 拦截: <span id="scoreValue">0</span></span>
      <span>💣 残余: <span id="bombsLeft">0</span></span>
      <span>⭐ 警戒: <span id="levelNum">1</span></span>
    </div>
    <div class="level-box">⏳ 下一波: <span id="refillTimer">--</span> s</div>
    <button class="game-btn" id="pauseGameBtn">⏸️ 暂停</button>
    <button class="game-btn" id="resetGameBtn">🔄 重来</button>
    <button class="game-btn" id="backHomeBtn">🏠 主页</button>
    <button class="game-btn" id="gameFullscreenBtn">⛶ 全屏</button>
  </div>
  <div class="instruction">
    🖱️ 滑动/手指控制战车 | 点击/发射按钮开火 | 炸弹突破禁区即失败
  </div>
</div>

<div class="mobile-controls" id="mobileControls">
  <div class="ctrl-left-group">
    <div class="ctrl-btn ctrl-left" id="btnLeft">◀</div>
    <div class="ctrl-btn ctrl-right" id="btnRight">▶</div>
  </div>
  <div class="ctrl-right-group">
    <div class="ctrl-btn ctrl-shoot" id="btnShoot">🚀</div>
  </div>
</div>

<div class="game-over-modal" id="gameOverModal">
  <div class="modal-content" id="draggableModal">
    <div class="drag-handle" id="dragHandle">⋮⋮ 拖动</div>
    <h2>💀 防线崩溃</h2>
    <p>高爆弹侵入居民区，任务失败</p>
    <p>🎯 最终拦截: <span id="finalScore">0</span></p>
    <p>⚡ 最高警戒: <span id="finalLevel">1</span></p>
    <div>
      <button class="home-btn" id="restartBtn">🔄 重新挑战</button>
      <button class="home-btn" id="backHomeFromOverBtn">🏠 返回主页</button>
    </div>
  </div>
</div>

<div class="custom-confirm-modal" id="customConfirmModal">
  <div class="confirm-content">
    <h3>⚠️ 终止任务</h3>
    <p>返回主页将丢失当前战局，确定撤离吗？</p>
    <div>
      <button class="home-btn" id="confirmYesBtn" style="background: linear-gradient(135deg, #ff3366, #ff6633); margin:5px;">✅ 确认撤离</button>
      <button class="home-btn" id="confirmNoBtn" style="background: linear-gradient(135deg, #1e2a4a, #0a1a2a); border:1px solid #0ff; margin:5px;">❌ 继续战斗</button>
    </div>
  </div>
</div>

<script>
  (function(){
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const homePage = document.getElementById('homePage');
    const gameContainer = document.getElementById('gameContainer');
    const gameOverModal = document.getElementById('gameOverModal');
    const customConfirmModal = document.getElementById('customConfirmModal');
    const pauseBtn = document.getElementById('pauseGameBtn');
    const btnLeft = document.getElementById('btnLeft');
    const btnRight = document.getElementById('btnRight');
    const btnShoot = document.getElementById('btnShoot');

    // 固定逻辑分辨率 1000x700，弹道区上下留白通过画布内部设计和缩放充分展示
    const BASE_WIDTH = 1000;
    const BASE_HEIGHT = 700;
    const BOMB_START_Y = 40;
    const AIR_DEFENSE_Y = 580;
    const RESIDENTIAL_LINE_Y = 620;
    const GROUND_Y = 680;
    const AIR_MIN_X = 45;
    const AIR_MAX_X = BASE_WIDTH - 45;

    let score = 0, currentLevel = 1;
    let bombs = [], interceptors = [];
    let gameActive = false, gameOverFlag = false, paused = false, levelUpPending = false;
    let airDefenseX = BASE_WIDTH/2, lastAirDefenseX = airDefenseX, airDefenseVelocity = 0;
    let canShoot = true, shootCooldownFrames = 0;
    let bombWidth = 0, bombHeight = 32;
    const MAX_BOMBS_PER_ROW = 10;
    let refillTimer = 0, refillInterval = 4.0;
    let scaleRatio = 1, offsetX = 0, offsetY = 0;
    let animationId = null, wasPausedBeforeConfirm = false;
    let leftPressTimer = null, rightPressTimer = null;
    const MOVE_STEP = 12;

    function moveLeft() { if(gameActive && !gameOverFlag && !paused) airDefenseX = Math.max(AIR_MIN_X, airDefenseX - MOVE_STEP); }
    function moveRight() { if(gameActive && !gameOverFlag && !paused) airDefenseX = Math.min(AIR_MAX_X, airDefenseX + MOVE_STEP); }
    function startLeftMove() { if(gameActive && !gameOverFlag && !paused) { if(leftPressTimer) clearInterval(leftPressTimer); leftPressTimer = setInterval(moveLeft, 28); } }
    function stopLeftMove() { if(leftPressTimer) { clearInterval(leftPressTimer); leftPressTimer = null; } }
    function startRightMove() { if(gameActive && !gameOverFlag && !paused) { if(rightPressTimer) clearInterval(rightPressTimer); rightPressTimer = setInterval(moveRight, 28); } }
    function stopRightMove() { if(rightPressTimer) { clearInterval(rightPressTimer); rightPressTimer = null; } }

    function bindMobileControls() {
      if(btnLeft) {
        btnLeft.addEventListener('mousedown', startLeftMove); btnLeft.addEventListener('mouseup', stopLeftMove); btnLeft.addEventListener('mouseleave', stopLeftMove);
        btnLeft.addEventListener('touchstart', (e) => { e.preventDefault(); startLeftMove(); });
        btnLeft.addEventListener('touchend', (e) => { e.preventDefault(); stopLeftMove(); });
      }
      if(btnRight) {
        btnRight.addEventListener('mousedown', startRightMove); btnRight.addEventListener('mouseup', stopRightMove); btnRight.addEventListener('mouseleave', stopRightMove);
        btnRight.addEventListener('touchstart', (e) => { e.preventDefault(); startRightMove(); });
        btnRight.addEventListener('touchend', (e) => { e.preventDefault(); stopRightMove(); });
      }
      if(btnShoot) {
        btnShoot.addEventListener('click', (e) => { e.preventDefault(); shootProjectile(); });
        btnShoot.addEventListener('touchstart', (e) => { e.preventDefault(); shootProjectile(); });
      }
    }

    function updateCanvasScale() {
      if(!gameContainer) return;
      const containerWidth = gameContainer.clientWidth - 16;
      let maxHeight = window.innerHeight * 0.68;
      if(window.innerWidth > window.innerHeight) maxHeight = window.innerHeight * 0.78;
      else maxHeight = window.innerHeight * 0.66;
      const ratioW = containerWidth / BASE_WIDTH;
      const ratioH = maxHeight / BASE_HEIGHT;
      scaleRatio = Math.min(ratioW, ratioH, 1.28);
      const displayWidth = BASE_WIDTH * scaleRatio;
      const displayHeight = BASE_HEIGHT * scaleRatio;
      canvas.style.width = `${displayWidth}px`;
      canvas.style.height = `${displayHeight}px`;
      offsetX = (canvas.clientWidth - displayWidth) / 2;
      offsetY = (canvas.clientHeight - displayHeight) / 2;
    }

    function getCanvasCoords(clientX, clientY) {
      const rect = canvas.getBoundingClientRect();
      let x = (clientX - rect.left - offsetX) / scaleRatio;
      let y = (clientY - rect.top - offsetY) / scaleRatio;
      return { x: Math.min(BASE_WIDTH, Math.max(0, x)), y: Math.min(BASE_HEIGHT, Math.max(0, y)) };
    }

    function handleMove(clientX, clientY) {
      if(!gameActive || gameOverFlag || paused) return;
      const pos = getCanvasCoords(clientX, clientY);
      airDefenseX = Math.min(AIR_MAX_X, Math.max(AIR_MIN_X, pos.x));
    }

    function onPointerMove(e) {
      e.preventDefault();
      let cx, cy;
      if(e.touches) { cx = e.touches[0].clientX; cy = e.touches[0].clientY; }
      else { cx = e.clientX; cy = e.clientY; }
      if(cx && cy) handleMove(cx, cy);
    }

    function shootProjectile() {
      if(!gameActive || gameOverFlag || paused || !canShoot) return;
      let speedX = Math.min(14, Math.max(-14, airDefenseVelocity));
      let vx = speedX * 1.02 + (Math.random() - 0.5) * 0.9;
      let vy = -12.8 + (Math.random() - 0.5) * 0.6;
      interceptors.push({ x: airDefenseX, y: AIR_DEFENSE_Y - 18, vx, vy, active: true });
      canShoot = false;
      shootCooldownFrames = 8;
      if(navigator.vibrate) navigator.vibrate(20);
    }

    function updateUI() {
      document.getElementById('scoreValue').innerText = score;
      document.getElementById('levelNum').innerText = currentLevel;
      const activeCount = bombs.filter(b => b.active).length;
      document.getElementById('bombsLeft').innerText = activeCount;
    }

    function resetRefillTimerDynamic() {
      let base = Math.max(2.2, 5.0 - (currentLevel-1) * 0.55);
      base = Math.min(base, 5.2);
      refillInterval = base;
      refillTimer = refillInterval;
    }

    function generateRandomBombRow(yPos) {
      const bombCount = Math.floor(Math.random() * (MAX_BOMBS_PER_ROW - 2)) + 3;
      const startX = 40;
      bombWidth = (BASE_WIDTH - 80) / MAX_BOMBS_PER_ROW;
      let fallSpeed = 0.85 + (currentLevel - 1) * 0.18;
      fallSpeed = Math.min(fallSpeed, 3.3);
      const columns = new Array(MAX_BOMBS_PER_ROW).fill(false);
      let placed = 0;
      while(placed < bombCount) { const col = Math.floor(Math.random() * MAX_BOMBS_PER_ROW); if(!columns[col]) { columns[col]=true; placed++; } }
      const bombsRow = [];
      for(let col=0; col<MAX_BOMBS_PER_ROW; col++) {
        if(columns[col]) {
          let x = startX + col * bombWidth;
          bombsRow.push({ x, y: yPos, w: bombWidth-3, h: bombHeight-2, active: true, speedY: fallSpeed, falling: true, glowPhase: Math.random() * Math.PI*2 });
        }
      }
      return bombsRow;
    }

    function initBombsWave() {
      bombs = [];
      const rowGap = bombHeight + 8;
      for(let row=0; row<3; row++) bombs.push(...generateRandomBombRow(BOMB_START_Y + row * rowGap));
      updateUI();
    }

    function addRandomTopRow() {
      if(gameOverFlag || !gameActive) return;
      const shiftY = bombHeight + 8;
      for(let bomb of bombs) bomb.y += shiftY;
      bombs = bombs.filter(b => b.y + b.h < BASE_HEIGHT + 120);
      bombs.push(...generateRandomBombRow(BOMB_START_Y));
      updateUI();
    }

    function performRefill() { if(!gameOverFlag && gameActive && !paused) { addRandomTopRow(); resetRefillTimerDynamic(); } }

    function advanceToNextLevel() {
      if(gameOverFlag) return;
      currentLevel++;
      updateUI();
      interceptors = [];
      airDefenseX = Math.min(AIR_MAX_X, Math.max(AIR_MIN_X, BASE_WIDTH/2));
      lastAirDefenseX = airDefenseX;
      bombs = [];
      initBombsWave();
      for(let b of bombs) b.falling = true;
      resetRefillTimerDynamic();
      canShoot = true; shootCooldownFrames = 0;
      levelUpPending = false;
      updateUI();
    }

    function checkClearAndLevelUp() {
      if(levelUpPending || gameOverFlag) return;
      if(!bombs.some(b => b.active) && bombs.length > 0) { levelUpPending = true; advanceToNextLevel(); }
    }

    function updateInterceptors() {
      for(let i=0; i<interceptors.length; i++) {
        const inter = interceptors[i];
        if(!inter.active) { interceptors.splice(i,1); i--; continue; }
        inter.x += inter.vx; inter.y += inter.vy;
        if(inter.y+10 < -80 || inter.y-10 > BASE_HEIGHT+150 || inter.x < -100 || inter.x > BASE_WIDTH+100) { inter.active=false; interceptors.splice(i,1); i--; continue; }
        let hit = false;
        for(let idx=0; idx<bombs.length; idx++) {
          const b = bombs[idx];
          if(!b.active) continue;
          if(inter.x+8 > b.x && inter.x-8 < b.x+b.w && inter.y+8 > b.y && inter.y-8 < b.y+b.h) {
            b.active = false; score += 10; updateUI(); inter.active = false; hit = true;
            checkClearAndLevelUp();
            break;
          }
        }
        if(hit) { interceptors.splice(i,1); i--; }
      }
    }

    function updateBombsMovement(deltaSec) {
      if(gameOverFlag) return;
      for(let bomb of bombs) if(bomb.active && bomb.falling) bomb.y += bomb.speedY * deltaSec * 60;
      for(let bomb of bombs) {
        if(bomb.active && bomb.falling && (bomb.y + bomb.h) >= RESIDENTIAL_LINE_Y) {
          gameOverFlag = true; gameActive = false;
          document.getElementById('finalScore').innerText = score;
          document.getElementById('finalLevel').innerText = currentLevel;
          gameOverModal.style.display = 'flex';
          return;
        }
      }
      updateUI();
    }

    let lastTimestamp = 0;
    function updateLogic(deltaSec) {
      if(!gameActive || gameOverFlag || paused) return;
      airDefenseVelocity = airDefenseX - lastAirDefenseX;
      lastAirDefenseX = airDefenseX;
      if(shootCooldownFrames > 0 && --shootCooldownFrames === 0) canShoot = true;
      if(refillTimer > 0) { refillTimer -= deltaSec; if(refillTimer <= 0) { refillTimer = 0; performRefill(); } }
      document.getElementById('refillTimer').innerText = refillTimer > 0 ? refillTimer.toFixed(1) : "0.0";
      updateBombsMovement(deltaSec);
      updateInterceptors();
      airDefenseX = Math.min(AIR_MAX_X, Math.max(AIR_MIN_X, airDefenseX));
    }

    // 绘图函数 — 保持华丽视觉，星辰闪烁增强弹道延伸感
    function drawBombShape(bomb) {
      ctx.save(); ctx.shadowBlur=6; ctx.shadowColor="#ff5500";
      const grad = ctx.createLinearGradient(bomb.x,bomb.y,bomb.x+bomb.w,bomb.y+bomb.h);
      grad.addColorStop(0,"#4a2a1a"); grad.addColorStop(1,"#8a3a1a");
      ctx.fillStyle=grad; ctx.beginPath(); ctx.ellipse(bomb.x+bomb.w/2,bomb.y+bomb.h/2,bomb.w/2,bomb.h/2,0,0,Math.PI*2); ctx.fill();
      ctx.fillStyle="#dd8844"; ctx.fillRect(bomb.x+bomb.w/2-4,bomb.y+bomb.h/2-bomb.h/2-4,8,8);
      ctx.fillStyle=`rgba(255,80,30,0.9)`; ctx.beginPath(); ctx.ellipse(bomb.x+bomb.w/2,bomb.y+bomb.h/2-bomb.h/2-6,4,6,0,0,Math.PI*2); ctx.fill();
      ctx.fillStyle="#ffcc88"; ctx.font=`${Math.floor(bomb.h*0.5)}px "Segoe UI"`; ctx.fillText("💣",bomb.x+bomb.w/2-10,bomb.y+bomb.h/2+6);
      ctx.restore();
    }
    function drawMissileLauncher() {
      const x=airDefenseX, y=AIR_DEFENSE_Y;
      ctx.save(); ctx.fillStyle="#2a6a4a"; ctx.beginPath(); ctx.ellipse(x,y+6,22,12,0,0,Math.PI*2); ctx.fill();
      ctx.fillStyle="#1e4a2e"; ctx.beginPath(); ctx.ellipse(x,y+4,20,10,0,0,Math.PI*2); ctx.fill();
      ctx.fillStyle="#3a8a5a"; ctx.fillRect(x-18,y-8,36,14); ctx.fillStyle="#88cc88"; ctx.fillRect(x-7,y-12,14,6);
      ctx.fillStyle="#4a6e3a"; ctx.beginPath(); ctx.moveTo(x-8,y-18); ctx.lineTo(x,y-32); ctx.lineTo(x+8,y-18); ctx.fill();
      ctx.fillStyle="#ff5555"; ctx.beginPath(); ctx.moveTo(x-3,y-48); ctx.lineTo(x,y-58); ctx.lineTo(x+3,y-48); ctx.fill();
      ctx.fillStyle="#88aaff"; ctx.beginPath(); ctx.arc(x+14,y-10,4,0,Math.PI*2); ctx.fill();
      ctx.font="bold 9px 'Orbitron'"; ctx.fillStyle="#0ff"; ctx.fillText(`⚡ ${Math.abs(airDefenseVelocity).toFixed(1)}`, x-45, y-22);
      ctx.restore();
    }
    function drawInterceptorMissile(inter) {
      ctx.save(); ctx.shadowBlur=5; ctx.shadowColor="#0ff";
      ctx.beginPath(); ctx.moveTo(inter.x,inter.y-5); ctx.lineTo(inter.x+3,inter.y); ctx.lineTo(inter.x+2,inter.y+3); ctx.lineTo(inter.x,inter.y+4); ctx.lineTo(inter.x-2,inter.y+3); ctx.lineTo(inter.x-3,inter.y); ctx.fillStyle="#4fc3f7"; ctx.fill();
      ctx.fillStyle="#ffaa44"; ctx.beginPath(); ctx.moveTo(inter.x,inter.y-6); ctx.lineTo(inter.x+2,inter.y-3); ctx.lineTo(inter.x-2,inter.y-3); ctx.fill();
      ctx.restore();
    }
    function drawResidential() { ctx.fillStyle="rgba(220,60,50,0.45)"; ctx.fillRect(0,RESIDENTIAL_LINE_Y,BASE_WIDTH,GROUND_Y-RESIDENTIAL_LINE_Y+12); ctx.fillStyle="#ff8877"; ctx.font="bold 14px 'Orbitron'"; ctx.textAlign="center"; ctx.fillText("⚠️ 绝对禁区",BASE_WIDTH/2,RESIDENTIAL_LINE_Y+22); ctx.textAlign="left"; }
    function drawStars() { for(let i=0;i<180;i++) { const starX=(i*131)%BASE_WIDTH, starY=(i*253)%(RESIDENTIAL_LINE_Y-30); ctx.fillStyle=`rgba(255,255,200,${0.2+Math.sin(Date.now()*0.001+i)*0.12})`; ctx.beginPath(); ctx.arc(starX,starY,1.2,0,Math.PI*2); ctx.fill(); } }
    function draw() {
      ctx.clearRect(0,0,BASE_WIDTH,BASE_HEIGHT); ctx.fillStyle="#03061a"; ctx.fillRect(0,0,BASE_WIDTH,BASE_HEIGHT);
      drawStars();
      for(let b of bombs) if(b.active) drawBombShape(b);
      for(let i of interceptors) drawInterceptorMissile(i);
      drawMissileLauncher(); drawResidential();
      if(levelUpPending && !gameOverFlag){ ctx.font="bold 26px 'Orbitron'"; ctx.fillStyle="#0ff"; ctx.textAlign="center"; ctx.fillText("⚡ 等级提升 ⚡", BASE_WIDTH/2, 110); }
      if(paused && gameActive && !gameOverFlag){ ctx.font="bold 32px 'Orbitron'"; ctx.fillStyle="#ffe5aa"; ctx.textAlign="center"; ctx.fillText("⏸ 暂停", BASE_WIDTH/2, BASE_HEIGHT/2); }
      ctx.textAlign="left";
    }

    function togglePause(){
      if(!gameActive || gameOverFlag) return;
      paused=!paused;
      pauseBtn.innerHTML=paused?"▶️ 继续":"⏸️ 暂停";
      if(paused) pauseBtn.classList.add("pause-btn-active");
      else pauseBtn.classList.remove("pause-btn-active");
      if(!paused) lastTimestamp=0;
    }
    function resetGame(){
      gameActive=true; gameOverFlag=false; paused=false; levelUpPending=false;
      score=0; currentLevel=1; interceptors=[]; bombs=[];
      canShoot=true; shootCooldownFrames=0;
      airDefenseX=BASE_WIDTH/2; lastAirDefenseX=airDefenseX; airDefenseVelocity=0;
      initBombsWave(); for(let b of bombs) b.falling=true;
      resetRefillTimerDynamic();
      updateUI(); gameOverModal.style.display='none';
      pauseBtn.innerHTML="⏸️ 暂停"; pauseBtn.classList.remove("pause-btn-active");
      lastTimestamp=0;
    }
    function showGame(){ homePage.style.display='none'; gameContainer.style.display='flex'; updateCanvasScale(); resetGame(); draw(); }
    function backHomeWithConfirm(){
      if(gameOverFlag){ if(animationId) cancelAnimationFrame(animationId); window.location.href='index.html'; return; }
      wasPausedBeforeConfirm=paused;
      if(!paused && gameActive) togglePause();
      customConfirmModal.style.display='flex';
      document.getElementById('confirmYesBtn').onclick=()=>{ customConfirmModal.style.display='none'; if(animationId) cancelAnimationFrame(animationId); window.location.href='index.html'; };
      document.getElementById('confirmNoBtn').onclick=()=>{ customConfirmModal.style.display='none'; if(!wasPausedBeforeConfirm && paused && gameActive) togglePause(); lastTimestamp=0; };
    }
    function toggleFullscreen(){ if(!document.fullscreenElement) document.documentElement.requestFullscreen(); else document.exitFullscreen(); }

    function bindEvents(){
      document.getElementById('startGameBtn')?.addEventListener('click', showGame);
      document.getElementById('fullscreenBtn')?.addEventListener('click', toggleFullscreen);
      document.getElementById('resetGameBtn')?.addEventListener('click', ()=>{ if(gameContainer.style.display === 'flex') resetGame(); });
      document.getElementById('backHomeBtn')?.addEventListener('click', backHomeWithConfirm);
      document.getElementById('gameFullscreenBtn')?.addEventListener('click', toggleFullscreen);
      document.getElementById('restartBtn')?.addEventListener('click', ()=>{ resetGame(); gameOverModal.style.display='none'; });
      document.getElementById('backHomeFromOverBtn')?.addEventListener('click', backHomeWithConfirm);
      pauseBtn?.addEventListener('click', togglePause);
      bindMobileControls();
      canvas.addEventListener('mousemove', onPointerMove);
      canvas.addEventListener('touchmove', onPointerMove, { passive: false });
      canvas.addEventListener('touchstart', (e)=>{ e.preventDefault(); if(e.touches.length) handleMove(e.touches[0].clientX, e.touches[0].clientY); });
      canvas.addEventListener('click', (e)=>{ e.preventDefault(); shootProjectile(); });
      window.addEventListener('keydown',(e)=>{
        if((e.code==='Space'||e.code==='Enter') && gameContainer.style.display === 'flex'){ e.preventDefault(); shootProjectile(); }
        if(e.code==='KeyP' && gameContainer.style.display === 'flex'){ e.preventDefault(); togglePause(); }
        if(e.code==='ArrowLeft' && gameContainer.style.display === 'flex'){ e.preventDefault(); moveLeft(); }
        if(e.code==='ArrowRight' && gameContainer.style.display === 'flex'){ e.preventDefault(); moveRight(); }
      });
      window.addEventListener('resize', () => { if(gameContainer.style.display === 'flex') { updateCanvasScale(); draw(); } });
      window.addEventListener('orientationchange', () => { setTimeout(() => { if(gameContainer.style.display === 'flex') { updateCanvasScale(); draw(); } }, 50); });
      const modal=document.getElementById('draggableModal'), handle=document.getElementById('dragHandle');
      let drag=false,sX,sY,iL,iT;
      handle.addEventListener('mousedown',(e)=>{ e.preventDefault(); drag=true; sX=e.clientX; sY=e.clientY; const rect=modal.getBoundingClientRect(),pr=modal.parentElement.getBoundingClientRect(); iL=rect.left-pr.left; iT=rect.top-pr.top; modal.style.position='absolute'; modal.style.left=iL+'px'; modal.style.top=iT+'px'; document.body.style.userSelect='none'; });
      window.addEventListener('mousemove',(e)=>{ if(!drag) return; let nl=iL+(e.clientX-sX), nt=iT+(e.clientY-sY); const pr=modal.parentElement.getBoundingClientRect(), mr=modal.getBoundingClientRect(); nl=Math.min(Math.max(nl,8),pr.width-mr.width-8); nt=Math.min(Math.max(nt,8),pr.height-mr.height-8); modal.style.left=nl+'px'; modal.style.top=nt+'px'; });
      window.addEventListener('mouseup',()=>{ drag=false; document.body.style.userSelect=''; });
    }

    function gameLoop(now){
      if(!lastTimestamp) lastTimestamp=now;
      let delta=Math.min(0.033,(now-lastTimestamp)/1000);
      if(delta<=0.001) delta=0.016;
      lastTimestamp=now;
      updateLogic(delta);
      draw();
      animationId=requestAnimationFrame(gameLoop);
    }
    function init(){
      bindEvents(); updateCanvasScale(); animationId=requestAnimationFrame(gameLoop);
      const setVH=()=>{ let vh=window.innerHeight*0.01; document.documentElement.style.setProperty('--vh',`${vh}px`); };
      setVH(); window.addEventListener('resize', setVH);
    }
    init();
  })();
</script>
